name: Cleanup untagged images
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - name: Delete untagged images
      uses: dataaxiom/ghcr-cleanup-action@v1
      with:
        package: bettertapebot
        token: ${{ secrets.GITHUB_TOKEN }}
        delete-untagged: true
        dry-run: false