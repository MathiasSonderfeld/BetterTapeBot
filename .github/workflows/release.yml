name: Build & Release

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    uses: ./.github/workflows/build.yml

#  build-native:
#    uses: ./.github/workflows/build-native.yml

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - { tag: "nonroot", suffix: "" }
          - { tag: "debug-nonroot", suffix: "-debug" }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_TAG=${{ matrix.variant.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.version }}${{ matrix.variant.suffix }}
            ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:latest${{ matrix.variant.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

