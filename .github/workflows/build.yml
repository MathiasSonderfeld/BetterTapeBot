name: build.yml

on:
  workflow_call:
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}
      image_name:
        value: ${{ jobs.build.outputs.image_name }}


jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_name: ${{ steps.imagename.outputs.image_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from gradle.properties
        id: version
        run: |-
          VERSION=$(grep -E "^version\s*=" gradle.properties | tail -n1 | cut -d'=' -f2 | xargs)
          if [ -z "${VERSION}" ]; then
            echo "Version is empty – check gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/app.jar
          retention-days: 1

      - name: Normalize image name
        id: imagename
        run: |
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
